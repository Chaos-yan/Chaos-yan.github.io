<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Game Music Designer & Composer — Interactive Audio · Electronic · Orchestral">
    <meta property="og:title" content="YS — Game Music Portfolio">
    <meta property="og:description" content="Interactive Game Music · Electronic Production · Orchestral Composition">
    <meta property="og:type" content="website">
    <title>YS — Game Music Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <a href="#" class="logo">YS</a>
        <button class="lang-btn" id="langBtn">
            <span class="opt on" data-l="zh">中</span>
            <span class="opt" data-l="en">EN</span>
        </button>
    </header>

    <!-- Hero -->
    <section class="hero">
        <p class="hero-tag">Game Music Designer & Composer</p>
        <p class="hero-desc" data-zh="交互音频设计 <span>·</span> 电子音乐制作 <span>·</span> 管弦乐写作 <span>·</span> Wwise中间件" data-en="Interactive Audio <span>·</span> Electronic Production <span>·</span> Orchestral <span>·</span> Wwise">交互音频设计 <span>·</span> 电子音乐制作 <span>·</span> 管弦乐写作 <span>·</span> Wwise中间件</p>
    </section>

    <!-- Works -->
    <main class="works" id="works"></main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <a href="mailto:15706778301@163.com" class="footer-link"><span class="dot"></span>15706778301@163.com</a>
            <span class="footer-sep">·</span>
            <span data-zh="深圳 / 全球远程" data-en="Shenzhen / Global Remote">深圳 / 全球远程</span>
            <span class="footer-sep">·</span>
            <span>© 2026</span>
        </div>
    </footer>

    <!-- Audio Modal -->
    <div class="modal" id="audioModal">
        <div class="modal-bg" id="audioBg"></div>
        <div class="modal-box">
            <button class="modal-x" id="audioX">✕</button>
            <div class="modal-viz"><canvas id="audioViz"></canvas></div>
            <span class="modal-cat" id="audioCat"></span>
            <h2 class="modal-title" id="audioTitle"></h2>
            <p class="modal-desc" id="audioDesc"></p>
            <div class="modal-tech" id="audioTech"></div>
            <div class="modal-ctrl">
                <button class="ctrl-btn" id="apPrev">◂</button>
                <button class="ctrl-btn ctrl-play" id="apPlay">▶</button>
                <button class="ctrl-btn" id="apNext">▸</button>
                <div class="ctrl-track">
                    <span class="ctrl-time" id="apCur">0:00</span>
                    <div class="ctrl-bar" id="apBar"><div class="ctrl-fill" id="apFill"></div></div>
                    <span class="ctrl-time" id="apDur">0:00</span>
                </div>
                <div class="ctrl-vol">
                    <span>Vol</span>
                    <input type="range" id="apVol" min="0" max="100" value="80">
                </div>
            </div>
        </div>
    </div>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-bg" id="videoBg"></div>
        <div class="modal-box wide">
            <button class="modal-x" id="videoX">✕</button>
            <div class="video-wrap"><video id="videoEl" controls playsinline preload="none"></video></div>
            <span class="modal-cat" id="videoCat"></span>
            <h2 class="modal-title" id="videoTitle"></h2>
            <p class="modal-desc" id="videoDesc"></p>
            <div class="modal-tech" id="videoTech"></div>
        </div>
    </div>

    <audio id="globalAudio" preload="none"></audio>
    <script src="data/content.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
